<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bloom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard">
    <header class="topbar">
        <div>
            <h1>Bloom ⋆˙⟡</h1>
        </div>
    </header>
    <div class="create-box">
        <h2>New Goal</h2>
        <input id="goalEmoji" maxlength="2" placeholder="Emoji(s)">
        <input id="goalName" placeholder="Name">
        <textarea id="motivation" placeholder="Why are you doing this?"></textarea>
        <button id="createBtn">Create Goal</button>
    </div>
    <hr class="divider">
    <h2 class="section-title">My Goals</h2>
    <div id="goalContainer"></div>
    <div id="goalOverlay" class="overlay hidden">
        <div class="overlay-content">
            <button id="closeOverlay" class="close-btn">Back</button>
            <div id="goalContent"></div>
            <div id="editArea" class="overlay hidden">
                <div class="overlay-content edit-modal-content">
                    <button id="closeEditModal" class="close-btn">Close</button>
                    <h2>Edit</h2>
                    <input id="editEmoji" maxlength="2" placeholder="🌸">
                    <input id="editName" placeholder="Goal name">
                    <textarea id="editMotivation" placeholder="Why are you doing this?"></textarea>
                    <div class="edit-buttons">
                        <button id="saveEditBtn">Save Changes</button>
                        <button id="cancelEditBtn">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
