<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bloom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard">
    <div class="centered-stuff">
        <header class="topbar">
            <div>
                <h1>Bloom ⋆˙⟡</h1>
            </div>
            <nav class="nav-tabs"><button id="goalsTab">Goals</button><button id="journalTab">Journal</button></nav>
        </header>
        <div class="create-box">
            <h2>New Goal</h2>
            <input id="goalEmoji" maxlength="2" placeholder="Emoji(s)">
            <input id="goalName" placeholder="Name">
            <textarea id="motivation" placeholder="Why are you doing this?"></textarea>
            <button id="createBtn">Create Goal</button>
        </div>
        <hr class="divider">
        <h2 class="section-title">My Goals</h2>
        <div id="goalContainer"></div>
        <div id="goalOverlay" class="goal-page hidden">
            <div class="goal-page-content">
                <button id="closeOverlay" class="close-btn">Dashboard</button>
                <div id="goalContent"></div>
            </div>
        </div>
    </div>
    <div id="journalPage" class="journal-page hidden">
        <div class="journal-stuff">
            <button id="closeJournal" class="close-btn">Dashboard</button>
        </div>
        <h2>Journal ✧</h2>
        <div class="journal-create">
            <input id="journalTitle" placeholder="Entry title">
            <textarea id="journalText" placeholder="..."></textarea>
            <button id="saveJournalBtn">Save Entry</button>
        </div>
        <div id="journalEntries"></div>
    </div>
    <div id="editArea" class="modal-overlay hidden">
        <div class="edit-modal">
            <h2>Edit</h2>
            <input id="editEmoji" maxlength="2" placeholder="🌸">
            <input id="editName" placeholder="Goal name">
            <textarea id="editMotivation" placeholder="Why are you doing this?"></textarea>
            <div class="edit-buttons">
                <button type="button" id="saveEditBtn">Save Changes</button>
                <button type="button" id="cancelEditBtn">Cancel</button>
            </div>
        </div>
    </div>
    <div id="textModal" class="modal-overlay hidden">
        <div class="edit-modal">
            <h2 id="textModalTitle">New Note</h2>
            <textarea id="textModalInput" rows="8" placeholder="..."></textarea>
            <div class="edit-buttons">
                <button type="button" id="saveTextBtn">Save</button>
                <button type="button" id="cancelTextBtn">Cancel</button>
            </div>
        </div>

    </div>
    <div id="confetti-container"></div>
    <script src="js/app.js"></script>
</body>
</html>
