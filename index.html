<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bloom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard">
    <header class="topbar">
        <div>
            <h1>Bloom ⋆˙⟡</h1>
        </div>
    </header>
    <div class="create-box">
        <h2>New Goal</h2>
        <input id="goalEmoji" maxlength="2" placeholder="Emoji(s)">
        <input id="goalName" placeholder="Name">
        <textarea id="motivation" placeholder="Why are you doing this?"></textarea>
        <button id="createBtn">Create Goal</button>
    </div>
    <hr class="divider">
    <h2 class="section-title">My Goals</h2>
    <div id="goalContainer"></div>
    <div id="goalOverlay" class="goal-page hidden">
        <div class="goal-page-content">
            <button id="closeOverlay" class="close-btn">Dashboard</button>
            <div id="goalContent"></div>
        </div>
    </div>
    <div id="editArea" class="modal-overlay hidden">
        <div class="edit-modal">
            <h2>Edit</h2>
            <input id="editEmoji" maxlength="2" placeholder="🌸">
            <input id="editName" placeholder="Goal name">
            <textarea id="editMotivation" placeholder="Why are you doing this?"></textarea>
            <div class="edit-buttons">
                <button type="button" id="saveEditBtn">Save Changes</button>
                <button type="button" id="cancelEditBtn">Cancel</button>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
